name: mymovies
description: Aplikasi untuk melihat daftar film terbaru menggunakan TMDb API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client
  http: ^1.2.2

  # Local storage (simpan favorit)
  shared_preferences: ^2.3.2

  # Format tanggal & angka Indonesia
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
